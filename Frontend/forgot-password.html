<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Forgot Password
</title>

<link
rel="stylesheet"
href="css/style.css"
>

</head>

<body class="login-page">

<div class="login-container">

<h1>
Forgot Password
</h1>

<p
style="
margin-bottom:25px;
color:#64748b;
"
>

Enter your email address and a temporary password will be sent.

</p>


<form
id="forgotPasswordForm"
>

<input
type="email"
id="email"
placeholder="Enter email"
required
>

<button
type="submit"
>

Send Reset Email

</button>

</form>


<p
style="
margin-top:20px;
text-align:center;
"
>

<a
href="./pages/login.html"
>

Back to Login

</a>

</p>

</div>


<script
src="js/forgotPassword.js"
>

</script>

</body>

</html>
