    Toggle Dark Mode
</button>

        <a href="#" onclick="logout()">Logout</a>

    </aside>


    <main class="main-content">

        <h1>Change Password</h1>

        <p>
            Change your own password. Admin can also reset another user's password.
        </p>


        <div class="form-section">

            <h2>Change My Password</h2>

            <form id="changePasswordForm">

                <label>Old Password</label>
                <input
                    type="password"
                    id="oldPassword"
                    required
                >

                <label>New Password</label>
                <input
                    type="password"
                    id="newPassword"
                    required
                >

                <button type="submit">
                    Change Password
                </button>

            </form>

        </div>


        <div
            class="form-section"
            id="adminResetSection"
            style="display:none;"
        >

            <h2>Admin Reset User Password</h2>

            <form id="adminResetForm">

                <label>User Email</label>
                <input
                    type="email"
                    id="resetEmail"
                    required
                >

                <label>New Password</label>
                <input
                    type="text"
                    id="resetPassword"
                    required
                >

                <button type="submit">
                    Reset User Password
                </button>

            </form>

        </div>

    </main>

</div>
