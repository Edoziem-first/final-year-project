<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Profile</title>

    <link
        rel="stylesheet"
        href="../css/style.css"
    >

    <script src="../js/authCheck.js"></script>
    <script src="../js/roleCheck.js"></script>

</head>

<body>

<div class="layout">

    <aside class="sidebar">

    </aside>


    <main class="main-content">

        <h1>My Profile</h1>

        <p>
            View your account information and role details.
        </p>


        <div class="cards">

            <div class="card">

                <h3>Full Name</h3>

                <p id="profileName">
                    -
                </p>

            </div>


            <div class="card">

                <h3>Email Address</h3>

                <p id="profileEmail">
                    -
                </p>

            </div>


            <div class="card">

                <h3>Role</h3>

                <p id="profileRole">
                    -
                </p>

            </div>

        </div>



        <div class="form-section">

            <h2>
                Account Summary
            </h2>

            <div class="profile-grid">

                <div class="profile-item">

                    <strong>
                        User ID:
                    </strong>

                    <span id="profileId">

                    </span>

                </div>


                <div class="profile-item">

                    <strong>
                        Login Status:
                    </strong>

                    <span>
                        Active
                    </span>

                </div>


                <div class="profile-item">

                    <strong>
                        Session:
                    </strong>

                    <span>
                        Authenticated
                    </span>

                </div>


                <div class="profile-item">

                    <strong>
                        Password Management:
                    </strong>

                    <span>
                        Enabled
                    </span>

                </div>

            </div>

        </div>

    </main>

</div>


<script src="../js/profile.js"></script>

<script src="../js/sidebar.js"></script>

<script src="../js/logout.js"></script>

<script src="../js/darkMode.js"></script>


</body>

</html>
