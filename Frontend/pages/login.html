<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Oil Management Login

    </title>

   <link
rel="stylesheet"
href="../css/style.css"
>

</head>

<body class="login-page">

<div class="login-container">

    <h1>

        Oil Management System

    </h1>

    <p>

        Login to continue

    </p>


    <form id="loginForm">

        <label>

            Email

        </label>

        <input
            type="email"
            id="email"
            placeholder="Enter email"
            required
        >



        <label>

            Password

        </label>


        <div class="password-container">

            <input
                type="password"
                id="password"
                placeholder="Enter password"
                required
            >

            <span
                id="togglePassword"
            >

                Show

            </span>

        </div>



        <button
            type="submit"
        >

            Login

        </button>
        <p id="message"></p>

        <p
style="
margin-top:12px;
text-align:center;
"
>

<a href="../forgot-password.html">

Forgot Password?

</a>

</p>

    </form>

</div>



<script>

const passwordInput =
document.getElementById(
    "password"
);

const togglePassword =
document.getElementById(
    "togglePassword"
);


togglePassword.addEventListener(

    "click",

    ()=>{

        if(

            passwordInput.type ===
            "password"

        ){

            passwordInput.type =
            "text";

            togglePassword.innerText =
            "Hide";

        }

        else{

            passwordInput.type =
            "password";

            togglePassword.innerText =
            "Show";

        }

});

</script>


<script src="../js/login.js"></script>

</body>

</html>
