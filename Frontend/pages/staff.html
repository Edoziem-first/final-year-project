<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Staff Management</title>

    <link
        rel="stylesheet"
        href="../css/style.css"
    >

    <script src="../js/authCheck.js"></script>
    <script src="../js/roleCheck.js"></script>
</head>

<body>

<div class="layout">

    <aside class="sidebar"></aside>

    <main class="main-content">

        <h1>Staff Management</h1>

        <p>
            Manage staff records, login accounts, and approved attendance locations.
        </p>


        <div class="form-section">

            <h2>Add / Update Staff Member</h2>

            <form id="staffForm">

                <label>Staff ID</label>
                <input
                    type="text"
                    id="staff_id"
                    placeholder="e.g. STF001"
                    required
                >

                <label>Full Name</label>
                <input
                    type="text"
                    id="full_name"
                    placeholder="e.g. Chinedu Okafor"
                    required
                >

                <label>Role / Position</label>
                <select id="role" required>
                    <option value="">Select role</option>
                    <option value="Admin">Admin</option>
                    <option value="Depot Manager">Depot Manager</option>
                    <option value="Station Manager">Station Manager</option>
                    <option value="Cashier">Cashier</option>
                    <option value="Pump Attendant">Pump Attendant</option>
                    <option value="Driver">Driver</option>
                </select>

                <label>Assigned Station / Depot</label>
                <input
                    type="text"
                    id="station_name"
                    placeholder="e.g. Lekki Station"
                    required
                >

                <label>Phone Number</label>
                <input
                    type="text"
                    id="phone"
                    placeholder="e.g. 08012345678"
                    required
                >

                <label>Email Address</label>
                <input
                    type="email"
                    id="email"
                    placeholder="staff@email.com"
                    required
                >

                <label>Employment Status</label>
                <select id="employment_status" required>
                    <option value="">Select status</option>
                    <option value="Active">Active</option>
                    <option value="On Leave">On Leave</option>
                    <option value="Suspended">Suspended</option>
                    <option value="Inactive">Inactive</option>
                </select>

                <label>Office Latitude</label>
                <input
                    type="number"
                    step="any"
                    id="office_lat"
                    placeholder="e.g. 6.5244"
                >

                <label>Office Longitude</label>
                <input
                    type="number"
                    step="any"
                    id="office_lng"
                    placeholder="e.g. 3.3792"
                >

                <label>Allowed Radius Metres</label>
                <input
                    type="number"
                    id="allowed_radius"
                    placeholder="e.g. 200"
                    value="200"
                >

                <label class="checkbox-label">
                    <input
                        type="checkbox"
                        id="create_login"
                    >
                    Create login account for this staff
                </label>


                <div
                    id="loginFields"
                    class="login-fields"
                    style="display:none;"
                >

                    <label>Login Email</label>
                    <input
                        type="email"
                        id="login_email"
                        placeholder="staff@example.com"
                    >

                    <label>Temporary Password</label>
                    <input
                        type="text"
                        id="login_password"
                        placeholder="e.g. staff123"
                    >

                </div>


                <button type="submit">
                    Save Staff
                </button>

            </form>

        </div>


        <div class="table-section">

            <h2>Staff Records</h2>

            <input
                type="text"
                id="staffSearch"
                placeholder="Search staff..."
            >

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Staff ID</th>
                        <th>Full Name</th>
                        <th>Role</th>
                        <th>Station/Depot</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Lat</th>
                        <th>Lng</th>
                        <th>Radius</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="staffTable"></tbody>

            </table>

        </div>

    </main>

</div>

<script src="../js/api.js"></script>
<script src="../js/staff.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/logout.js"></script>
<script src="../js/darkMode.js"></script>

</body>

</html>
