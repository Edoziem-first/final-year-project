<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
PetroFlow OMS
</title>

<link
rel="stylesheet"
href="./css/style.css"
>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
Arial,
sans-serif;
}


body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:

linear-gradient(
135deg,

#67C6FF,

#ffffff,

#5fd6c2

);

overflow:hidden;

}


.landing-container{

width:100%;

max-width:700px;

padding:50px;

text-align:center;

background:

rgba(
255,
255,
255,
0.20
);

backdrop-filter:
blur(
18px
);

border-radius:30px;

box-shadow:

0 12px 40px
rgba(
0,
0,
0,
0.08
);

}


.logo{

width:2000px;

max-width:100%;

margin-bottom:-80px;

object-fit:contain;

}


h1{

font-size:54px;

color:#17223B;

margin-bottom:10px;

}


.subtitle{

font-size:20px;

color:#4c5b70;

margin-bottom:35px;

}


.login-btn{

padding:

18px
55px;

border:none;

border-radius:18px;

font-size:18px;

font-weight:700;

cursor:pointer;

background:#0F7B6C;

color:white;

transition:.3s;

}


.login-btn:hover{

transform:
translateY(-4px);

}

</style>

</head>

<body>

<div
class="landing-container"
>

<img

src="./assets/logo.png"

class="logo"

alt="PetroFlow OMS"

>

<h1>

PetroFlow OMS

</h1>

<p class="subtitle">

Smart Oil Depot & Fuel Station
Management Platform

</p>


<button

class="login-btn"

onclick="goLogin()"

>

Login

</button>

</div>


<script>

function goLogin(){

window.location.href =

"./pages/login.html";

}

</script>

</body>

</html>
